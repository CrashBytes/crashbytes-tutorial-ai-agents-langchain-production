# =============================================================================
# Kubernetes Secrets for AI Agent
# =============================================================================
# IMPORTANT: These are example templates. Never commit actual secrets to git!
# Use kubectl create secret or external secret managers like:
# - Sealed Secrets
# - External Secrets Operator
# - HashiCorp Vault
# - AWS Secrets Manager
# - Google Secret Manager
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: llm-secrets
  namespace: ai-agents
type: Opaque
stringData:
  # OpenAI API Key
  # Get from: https://platform.openai.com/api-keys
  openai-key: "REPLACE_WITH_YOUR_OPENAI_API_KEY"
  
  # Anthropic Claude API Key (optional)
  # Get from: https://console.anthropic.com/
  anthropic-key: "REPLACE_WITH_YOUR_ANTHROPIC_API_KEY"

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: ai-agents
type: Opaque
stringData:
  username: "agent_user"
  password: "REPLACE_WITH_SECURE_PASSWORD"
  database: "agent_db"

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: ai-agents
type: Opaque
stringData:
  # Redis password (optional - leave empty if no auth)
  password: ""

---
# =============================================================================
# Example: Creating Secrets via kubectl
# =============================================================================

# Create namespace
# kubectl create namespace ai-agents

# Create LLM secrets
# kubectl create secret generic llm-secrets \
#   --from-literal=openai-key='your-openai-key-here' \
#   --from-literal=anthropic-key='your-anthropic-key-here' \
#   -n ai-agents

# Create PostgreSQL secrets
# kubectl create secret generic postgres-secrets \
#   --from-literal=username='agent_user' \
#   --from-literal=password='your-secure-password' \
#   --from-literal=database='agent_db' \
#   -n ai-agents

# Create Redis secrets
# kubectl create secret generic redis-secrets \
#   --from-literal=password='' \
#   -n ai-agents

# =============================================================================
# Example: Using Sealed Secrets
# =============================================================================

# 1. Install sealed-secrets controller:
# kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.24.0/controller.yaml

# 2. Install kubeseal CLI:
# brew install kubeseal  # macOS
# # OR download from: https://github.com/bitnami-labs/sealed-secrets/releases

# 3. Create a regular secret file (secrets-template.yaml):
# apiVersion: v1
# kind: Secret
# metadata:
#   name: llm-secrets
#   namespace: ai-agents
# stringData:
#   openai-key: "your-key-here"

# 4. Seal the secret:
# kubeseal -f secrets-template.yaml -w sealed-secrets.yaml

# 5. Apply the sealed secret (safe to commit to git):
# kubectl apply -f sealed-secrets.yaml

# 6. Sealed Secrets controller will automatically decrypt and create the real secret

